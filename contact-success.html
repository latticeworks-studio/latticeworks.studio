.nav-links a {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 12px; letter-spacing: 0.25em;
  color: rgba(255,255,255,0.45); text-decoration: none; text-transform: uppercase;
  transition: color 0.2s;
}

.nav-links a:hover { color: #fff; }

.nav-dropdown { position: relative; }
.nav-dropdown > a { display: inline-flex; align-items: center; gap: 6px; }
.nav-dropdown > a::after { content: '▾'; font-size: 11px; }
.dropdown-menu {
  display: none;
  position: absolute; top: calc(100% + 14px); right: 0;
  background: rgba(26,25,24,0.97);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  min-width: 160px;
  padding: 6px 0;
  z-index: 101;
  list-style: none;
}
.nav-dropdown:hover .dropdown-menu,
.nav-dropdown:focus-within .dropdown-menu { display: block; }
.dropdown-menu::before {
  content: '';
  position: absolute;
  top: -14px; left: 0; right: 0;
  height: 14px;
}
.dropdown-menu a {
  display: block;
  padding: 9px 18px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 12px; letter-spacing: 0.25em;
  color: rgba(255,255,255,0.45); text-decoration: none; text-transform: uppercase;
  transition: color 0.2s, background 0.2s;
}
.dropdown-menu a:hover { color: #fff; background: rgba(255,255,255,0.04); }

.page {
  position: relative; z-index: 1; flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 120px 24px; text-align: center; gap: 24px;

.check {
  width: 56px; height: 56px;
  border: 2px solid #c9877b;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes popIn {
  from { opacity:0; transform: scale(0.5); }
  to   { opacity:1; transform: scale(1); }
}

h1 {
  font-family: 'Bakbak One', sans-serif;
  font-size: 42px; letter-spacing: 0.06em;
  animation: fadeUp 0.6s 0.15s ease both;
}

p {

  animation: fadeUp 0.6s 0.35s ease both;

}

.back-link:hover { opacity: 0.7; }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(12px); }
  to   { opacity:1; transform: translateY(0); }
