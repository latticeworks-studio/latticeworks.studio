<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowScript Docs — LatticeWorks Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Bakbak+One&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy:      #0d1b35;
  --navy-mid:  #111f3a;
  --amber:     #e8890f;
  --muted:     rgba(255,255,255,0.45);
  --faint:     rgba(255,255,255,0.06);
  --grid:      rgba(255,255,255,0.025);
  --border:    rgba(255,255,255,0.07);
}

body {
  background: var(--navy);
  color: #fff;
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 48px;
  background: linear-gradient(to bottom, rgba(13,27,53,0.97) 0%, transparent 100%);
  backdrop-filter: blur(2px);
}

.nav-logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
.nav-logo-svg { width: 36px; height: 36px; }

.nav-brand {
  font-family: 'Bakbak One', sans-serif;
  font-size: 17px; letter-spacing: 0.12em; color: #fff; line-height: 1;
}
.nav-brand span {
  display: block;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 9px; letter-spacing: 0.35em;
  color: var(--amber); margin-top: 2px;
}

.nav-links { display: flex; gap: 36px; list-style: none; }
.nav-links a {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 12px; letter-spacing: 0.25em;
  color: var(--muted); text-decoration: none; text-transform: uppercase;
  transition: color 0.2s;
}
.nav-links a:hover { color: #fff; }
.nav-links a.active { color: var(--amber); }

/* ── LAYOUT ── */
.docs-layout {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
  padding-top: 76px;
}

/* ── SIDEBAR ── */
.sidebar {
  position: sticky; top: 76px;
  height: calc(100vh - 76px);
  overflow-y: auto;
  border-right: 1px solid var(--border);
  padding: 40px 0 40px;
  background: rgba(13,27,53,0.6);
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.sidebar-product {
  padding: 0 24px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.sidebar-product-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 10px; letter-spacing: 0.35em;
  color: var(--amber); text-transform: uppercase;
  margin-bottom: 4px;
}

.sidebar-product-name {
  font-family: 'Bakbak One', sans-serif;
  font-size: 18px; letter-spacing: 0.06em; color: #fff;
}

.sidebar-back {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 10px; letter-spacing: 0.2em;
  color: var(--muted); text-decoration: none; text-transform: uppercase;
  margin-top: 10px;
  transition: color 0.2s;
}
.sidebar-back::before { content: '←'; }
.sidebar-back:hover { color: #fff; }

.sidebar-section-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 10px; letter-spacing: 0.3em;
  color: rgba(255,255,255,0.25); text-transform: uppercase;
  padding: 16px 24px 8px;
}

.sidebar-nav { list-style: none; }

.sidebar-nav li a {
  display: block;
  padding: 8px 24px;
  font-size: 13px; font-weight: 400;
  color: var(--muted);
  text-decoration: none;
  border-left: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  cursor: pointer;
}

.sidebar-nav li a:hover {
  color: #fff;
  background: rgba(255,255,255,0.03);
}

.sidebar-nav li a.active {
  color: var(--amber);
  border-left-color: var(--amber);
  background: rgba(232,137,15,0.06);
}

.sidebar-loading {
  padding: 16px 24px;
  font-size: 12px; color: rgba(255,255,255,0.2);
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: 0.1em;
}

/* ── MAIN CONTENT ── */
.doc-main {
  padding: 52px 64px 100px;
  max-width: 860px;
}

.doc-placeholder {
  display: flex; flex-direction: column;
  align-items: flex-start; gap: 16px;
  padding-top: 20px;
}

.doc-placeholder-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 11px; letter-spacing: 0.4em;
  color: var(--amber); text-transform: uppercase;
  display: flex; align-items: center; gap: 16px;
}
.doc-placeholder-label::after {
  content: ''; width: 60px; height: 1px;
  background: rgba(232,137,15,0.4);
}

.doc-placeholder-title {
  font-family: 'Bakbak One', sans-serif;
  font-size: 32px; letter-spacing: 0.06em; color: #fff;
}

.doc-placeholder-desc {
  font-size: 14px; font-weight: 300; line-height: 1.7;
  color: var(--muted); max-width: 440px;
}

/* ── MARKDOWN RENDERED ── */
.doc-content { animation: fadeIn 0.2s ease; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.doc-content h1 {
  font-family: 'Bakbak One', sans-serif;
  font-size: 32px; letter-spacing: 0.06em;
  color: #fff; margin-bottom: 20px; line-height: 1.1;
}

.doc-content h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 13px; letter-spacing: 0.35em;
  color: var(--amber); text-transform: uppercase;
  margin: 40px 0 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(232,137,15,0.2);
  display: flex; align-items: center; gap: 12px;
}
.doc-content h2::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, rgba(232,137,15,0.2), transparent);
}

.doc-content h3 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 16px; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.85);
  margin: 28px 0 10px;
}

.doc-content p {
  font-size: 14px; font-weight: 300; line-height: 1.8;
  color: rgba(255,255,255,0.7);
  margin-bottom: 14px;
}

.doc-content ul, .doc-content ol {
  padding-left: 20px;
  margin-bottom: 14px;
}

.doc-content li {
  font-size: 14px; font-weight: 300; line-height: 1.8;
  color: rgba(255,255,255,0.7);
  margin-bottom: 4px;
}

.doc-content code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 3px;
  padding: 1px 6px;
  color: rgba(232,137,15,0.9);
}

.doc-content pre {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 20px 24px;
  margin-bottom: 20px;
  overflow-x: auto;
}

.doc-content pre code {
  background: none; border: none; padding: 0;
  font-size: 13px; color: rgba(255,255,255,0.8);
}

.doc-content strong { color: #fff; font-weight: 600; }

.doc-content a { color: var(--amber); text-decoration: none; }
.doc-content a:hover { text-decoration: underline; }

.doc-content hr {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.07);
  margin: 32px 0;
}

.doc-content blockquote {
  border-left: 3px solid var(--amber);
  padding: 10px 20px;
  margin: 20px 0;
  background: rgba(232,137,15,0.05);
  border-radius: 0 4px 4px 0;
}

.doc-content blockquote p { margin: 0; color: var(--muted); font-style: italic; }

.doc-content table {
  width: 100%; border-collapse: collapse;
  margin-bottom: 20px; font-size: 13px;
}
.doc-content th {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
  font-size: 11px; color: var(--amber);
  border-bottom: 1px solid rgba(232,137,15,0.3);
  padding: 8px 12px; text-align: left;
}
.doc-content td {
  padding: 8px 12px; color: rgba(255,255,255,0.65);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  font-weight: 300; line-height: 1.6;
}

/* ── FOOTER ── */
footer {
  position: relative; z-index: 1;
  text-align: center; padding: 32px 24px;
  font-size: 11px; color: rgba(255,255,255,0.12);
  letter-spacing: 0.1em;
  border-top: 1px solid rgba(255,255,255,0.04);
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  nav { padding: 16px 24px; }
  .nav-links { gap: 20px; }
  .docs-layout { grid-template-columns: 1fr; }
  .sidebar { position: relative; top: 0; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  .doc-main { padding: 36px 24px 80px; }
}
</style>
<link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
</head>
<body>

<nav>
  <a href="../../index.html" class="nav-logo">
    <svg class="nav-logo-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(18,18) rotate(45)">
        <rect x="-13" y="-13" width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="-7"  y="-13" width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="-1"  y="-13" width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="5"   y="-13" width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="-13" y="-7"  width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="-7"  y="-7"  width="5" height="5" rx="0.5" fill="#fff"/>
        <rect x="-1"  y="-7"  width="5" height="5" rx="0.5" fill="#fff"/>
        <rect x="5"   y="-7"  width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="-13" y="-1"  width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="-7"  y="-1"  width="5" height="5" rx="0.5" fill="#fff"/>
        <rect x="-1"  y="-1"  width="5" height="5" rx="0.5" fill="#fff"/>
        <rect x="5"   y="-1"  width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="-13" y="5"   width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="-7"  y="5"   width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="-1"  y="5"   width="5" height="5" rx="0.5" fill="#e8890f"/>
        <rect x="5"   y="5"   width="5" height="5" rx="0.5" fill="#e8890f"/>
      </g>
    </svg>
    <div class="nav-brand">LATTICEWORKS<span>S T U D I O</span></div>
  </a>
  <ul class="nav-links">
    <li><a href="../../index.html">Home</a></li>
    <li><a href="../../about.html">About</a></li>
    <li><a href="../index.html" class="active">Docs</a></li>
    <li><a href="../../contact.html">Contact</a></li>
  </ul>
</nav>

<div class="docs-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-product">
      <div class="sidebar-product-label">Docs</div>
      <div class="sidebar-product-name">FlowScript</div>
      <a href="../index.html" class="sidebar-back">All products</a>
    </div>
    <div class="sidebar-section-label">Contents</div>
    <ul class="sidebar-nav" id="doc-list">
      <li><div class="sidebar-loading">Loading…</div></li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="doc-main" id="doc-main">
    <div class="doc-placeholder">
      <div class="doc-placeholder-label">FlowScript</div>
      <div class="doc-placeholder-title">DOCUMENTATION</div>
      <p class="doc-placeholder-desc">Select a topic from the sidebar to start reading. All docs are kept up to date with the latest version of FlowScript.</p>
    </div>
  </main>

</div>

<footer>© 2026 LATTICEWORKS STUDIO</footer>

<script>
  const REPO   = 'latticeworks-studio/flowscript_releases';
  const BRANCH = 'main';
  const BASE   = `https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}/docs`;

  const docList = document.getElementById('doc-list');
  const docMain = document.getElementById('doc-main');

  let activeLink = null;

  async function loadIndex() {
    try {
      const res  = await fetch(`${BASE}/index.json`, { cache: 'no-cache' });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      renderSidebar(data.docs ?? []);
      // auto-load first doc if ?doc= param present
      const param = new URLSearchParams(location.search).get('doc');
      if (param) loadDoc(param);
    } catch (err) {
      docList.innerHTML = `<li><div class="sidebar-loading">Could not load index.</div></li>`;
    }
  }

  function renderSidebar(docs) {
    docList.innerHTML = docs.map((d) =>
      `<li><a href="#" data-file="${d.file}" onclick="return false;">${d.title}</a></li>`
    ).join('');

    docList.querySelectorAll('a[data-file]').forEach((a) => {
      a.addEventListener('click', () => {
        loadDoc(a.dataset.file);
        history.replaceState(null, '', `?doc=${a.dataset.file}`);
      });
    });
  }

  async function loadDoc(file) {
    docMain.innerHTML = `<div class="doc-placeholder"><p class="doc-placeholder-desc" style="padding-top:20px">Loading…</p></div>`;

    // update active state
    if (activeLink) activeLink.classList.remove('active');
    activeLink = docList.querySelector(`a[data-file="${file}"]`);
    if (activeLink) activeLink.classList.add('active');

    try {
      const res = await fetch(`${BASE}/${file}`, { cache: 'no-cache' });
      if (!res.ok) throw new Error(res.status);
      const md   = await res.text();
      const html = marked.parse(md);
      docMain.innerHTML = `<div class="doc-content">${html}</div>`;
      docMain.scrollTop = 0;
      window.scrollTo(0, 0);
    } catch (err) {
      docMain.innerHTML = `<div class="doc-placeholder"><p class="doc-placeholder-desc" style="padding-top:20px; color:#ff9090">Could not load this document. It may not exist yet.</p></div>`;
    }
  }

  loadIndex();
</script>

</body>
</html>
